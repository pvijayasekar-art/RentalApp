<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentFlow</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { 
        background: #0f1117; 
        color: #e8eaf0; 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 16px;
        line-height: 1.5;
      }
      #root { min-height: 100vh; }
      .screen { padding: 20px; }
      .header { 
        position: fixed; top: 0; left: 0; right: 0;
        background: #1a1d27; border-bottom: 1px solid #2a2d3d;
        padding: 12px 16px; display: flex; align-items: center; gap: 12;
        z-index: 100;
      }
      .logo { 
        width: 32px; height: 32px; border-radius: 8px;
        background: linear-gradient(135deg,#f97316,#ea580c);
        display: flex; align-items: center; justify-content: center;
        font-weight: bold; color: white;
      }
      .content { margin-top: 60px; }
      .card {
        background: #1a1d27;
        border: 1px solid #2a2d3d;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
      }
      .stat-value { font-size: 24px; font-weight: 700; color: #f97316; }
      .stat-label { font-size: 13px; color: #6b7280; }
      .bottom-nav {
        position: fixed; bottom: 0; left: 0; right: 0;
        background: #1a1d27; border-top: 1px solid #2a2d3d;
        display: flex; justify-content: space-around;
        padding: 8px 0;
        z-index: 100;
      }
      .nav-item {
        display: flex; flex-direction: column; align-items: center;
        padding: 4px 12px; border: none; background: transparent;
        color: #6b7280; font-size: 11px; cursor: pointer;
      }
      .nav-item.active { color: #f97316; }
      button { font-family: inherit; cursor: pointer; }
      .loading { padding: 40px; text-align: center; color: #6b7280; }
      .error { padding: 20px; background: #ef4444; color: white; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">Loading RentFlow...</div>
    </div>
    
    <script>
      // ==========================================
      // INLINE RENTFLOW APP - NO BUNDLE NEEDED
      // ==========================================
      
      console.log('=== Inline app starting ===');
      
      const API_BASE = 'http://10.131.144.64:5000';
      let currentPage = 'dashboard';
      let dashboardData = null;
      
      // Simple fetch wrapper
      async function api(endpoint) {
        const url = `${API_BASE}/api${endpoint}`;
        console.log('API call:', url);
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.json();
        } catch (err) {
          console.error('API error:', err);
          throw err;
        }
      }
      
      // Format currency
      function fmt(num) {
        return '₹' + (num || 0).toLocaleString('en-IN');
      }
      
      // Render functions
      function renderHeader() {
        return `
          <header class="header">
            <div class="logo">R</div>
            <span style="font-weight:700;font-size:18px;">RentFlow</span>
          </header>
        `;
      }
      
      function renderBottomNav() {
        const items = [
          { id: 'dashboard', label: 'Home', icon: '🏠' },
          { id: 'properties', label: 'Properties', icon: '🏢' },
          { id: 'tenants', label: 'Tenants', icon: '👥' },
          { id: 'income', label: 'Income', icon: '💰' },
          { id: 'expenses', label: 'Expenses', icon: '💸' }
        ];
        
        return `
          <nav class="bottom-nav">
            ${items.map(item => `
              <button class="nav-item ${currentPage === item.id ? 'active' : ''}" 
                      onclick="setPage('${item.id}')">
                <span style="font-size:20px;">${item.icon}</span>
                ${item.label}
              </button>
            `).join('')}
          </nav>
        `;
      }
      
      function renderDashboard() {
        if (!dashboardData) {
          return '<div class="loading">Loading dashboard...</div>';
        }
        
        if (dashboardData.error) {
          return `
            <div class="screen">
              <div class="error">
                <strong>Error:</strong> ${dashboardData.error}<br>
                <small>API: ${API_BASE}</small><br>
                <button onclick="loadDashboard()" style="margin-top:10px;padding:8px 16px;">Retry</button>
              </div>
            </div>
          `;
        }
        
        const stats = dashboardData.stats || {};
        
        return `
          <div class="screen">
            <div class="content">
              <h1 style="margin-bottom:16px;">Dashboard</h1>
              
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
                <div class="card">
                  <div class="stat-value">${stats.totalProperties || 0}</div>
                  <div class="stat-label">Properties</div>
                </div>
                <div class="card">
                  <div class="stat-value">${stats.totalTenants || 0}</div>
                  <div class="stat-label">Tenants</div>
                </div>
                <div class="card">
                  <div class="stat-value" style="color:#22c55e;">${fmt(stats.monthlyCollection)}</div>
                  <div class="stat-label">Monthly Income</div>
                </div>
                <div class="card">
                  <div class="stat-value" style="color:#ef4444;">${fmt(stats.monthlyExpenses)}</div>
                  <div class="stat-label">Monthly Expenses</div>
                </div>
              </div>
              
              <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <span style="color:#6b7280;">Net Income</span>
                  <span style="font-size:20px;font-weight:700;color:#22c55e;">${fmt(stats.netIncome)}</span>
                </div>
              </div>
              
              <div style="margin-top:20px;padding:12px;background:#1a1d27;border-radius:8px;">
                <small style="color:#6b7280;">API Connected: ${API_BASE}</small>
              </div>
            </div>
          </div>
        `;
      }
      
      function renderProperties() {
        return `
          <div class="screen">
            <div class="content">
              <h1 style="margin-bottom:16px;">Properties</h1>
              <div class="card">
                <p style="color:#6b7280;">Property list coming soon...</p>
              </div>
            </div>
          </div>
        `;
      }
      
      function renderTenants() {
        return `
          <div class="screen">
            <div class="content">
              <h1 style="margin-bottom:16px;">Tenants</h1>
              <div class="card">
                <p style="color:#6b7280;">Tenant list coming soon...</p>
              </div>
            </div>
          </div>
        `;
      }
      
      function renderIncome() {
        return `
          <div class="screen">
            <div class="content">
              <h1 style="margin-bottom:16px;">Income</h1>
              <div class="card">
                <p style="color:#6b7280;">Income records coming soon...</p>
              </div>
            </div>
          </div>
        `;
      }
      
      function renderExpenses() {
        return `
          <div class="screen">
            <div class="content">
              <h1 style="margin-bottom:16px;">Expenses</h1>
              <div class="card">
                <p style="color:#6b7280;">Expense records coming soon...</p>
              </div>
            </div>
          </div>
        `;
      }
      
      function render() {
        const pages = {
          dashboard: renderDashboard,
          properties: renderProperties,
          tenants: renderTenants,
          income: renderIncome,
          expenses: renderExpenses
        };
        
        const content = (pages[currentPage] || renderDashboard)();
        
        document.getElementById('root').innerHTML = 
          renderHeader() + content + renderBottomNav();
      }
      
      async function loadDashboard() {
        try {
          document.getElementById('root').innerHTML = 
            renderHeader() + '<div class="loading">Loading dashboard...</div>' + renderBottomNav();
          
          const data = await api('/dashboard');
          dashboardData = data;
          console.log('Dashboard loaded:', data);
        } catch (err) {
          console.error('Failed to load dashboard:', err);
          dashboardData = { error: err.message };
        }
        render();
      }
      
      function setPage(page) {
        currentPage = page;
        render();
        if (page === 'dashboard' && !dashboardData) {
          loadDashboard();
        }
      }
      
      // Error handling
      window.onerror = function(msg, url, line, col, error) {
        console.error('Error:', msg, url, line, col);
        document.getElementById('root').innerHTML = 
          `<div class="error">Error: ${msg}<br>Line: ${line}</div>`;
        return true;
      };
      
      // Start the app
      console.log('=== Starting RentFlow ===');
      document.getElementById('root').innerHTML = '<div class="loading">Starting app...</div>';
      
      // Load dashboard and render
      loadDashboard();
      
      // Refresh every 30 seconds
      setInterval(() => {
        if (currentPage === 'dashboard') {
          loadDashboard();
        }
      }, 30000);
    </script>
  </body>
</html>
