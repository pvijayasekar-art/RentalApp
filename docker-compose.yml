
services:
  mysql:
    image: mysql:8.0
    container_name: rental-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rentalpass123
      MYSQL_DATABASE: rental_db
    ports:
      - "3316:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prentalpass123"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: rental-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: rentalpass123
      DB_NAME: rental_db
      PORT: 5000
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - ./backups:/app/backups

  frontend:
    build: ./frontend
    container_name: rental-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
  uploads_data:
